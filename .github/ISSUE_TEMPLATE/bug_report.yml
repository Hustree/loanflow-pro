name: Bug report
description: Report a defect in LoanFlow Pro
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: input
    id: version
    attributes:
      label: Commit / version
      description: Output of `git rev-parse --short HEAD` or the deploy URL
    validations: { required: true }
  - type: textarea
    id: description
    attributes:
      label: What went wrong?
      placeholder: A clear description of the bug
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations: { required: true }
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options: [Chromium, Firefox, Safari, Other]
  - type: textarea
    id: extra
    attributes:
      label: Additional context, screenshots, console output
